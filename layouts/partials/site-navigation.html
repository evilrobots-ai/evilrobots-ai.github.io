<nav class="site-nav" role="navigation" aria-label="Primary">
  <div class="site-nav__inner">
    <a href="{{ .Site.Home.RelPermalink }}" class="site-nav__brand" aria-label="{{ .Site.Title }}">
      {{ with .Site.Params.site_logo }}
        <img src="{{ relURL . }}" alt="{{ $.Site.Title }}" />
      {{ else }}
        <span>{{ .Site.Title }}</span>
      {{ end }}
    </a>
    {{ if .Site.Menus.main }}
      <div class="site-nav__links">
        {{ range .Site.Menus.main }}
          <a class="site-nav__link{{ if or ($.IsMenuCurrent "main" .) ($.HasMenuCurrent "main" .) }} is-current{{ end }}" href="{{ .URL }}">{{ .Name }}</a>
        {{ end }}
      </div>
    {{ end }}
  </div>
</nav>
